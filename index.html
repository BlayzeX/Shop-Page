<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>My Shop</title>
</head>
<body>
    <header>
        <h1>My Shop</h1>
        <div class="icons">
        <img src="https://image2url.com/r2/default/images/1774799238052-3a2b58e8-762f-4960-a02f-14b891d1182b.png" alt="shop icon" id="shop-icon">
        <span id="cart-count">0</span>
        </div>
    </header>
        <div class="container">
            <div class="products"></div>
        </div>
        <div class="cart">
            <h2>Shopping Cart</h2>
            <div class="cart-items"></div>
            <div class="cart-total">
                <h3>Total: $<span id="total-price">0.00</span></h3>
            </div>
        </div>
    <script src="script.js"></script>
</body>
</html>
