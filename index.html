<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Shop Page</title>
</head>
<body>
    <input type="text" name="find" id="input" placeholder="Search...">
    <header>
        <h1>Shop</h1>
        <div id="div-Icon">
        <img src="https://image2url.com/r2/default/images/1775067957981-9c3d927f-0078-436b-a238-7423a231f623.png" alt="Shop Icon" id="shop-icon">
        <span id="cart-count">0</span>
        </div>
    </header>
    <div class="cart">
        <h2 class="h2">Shopping Cart</h2>
        <p id="cart-items">No items in the cart.</p>
        <p id="cart-price">Total: $0.00</p>
        <button id="cancel-button">Cancel</button>
        <button id="checkout-button">Checkout</button>
    </div>
    <div class="container">
        <div class="product">
            <h2>Gaming Laptop</h2>
            <img src="https://image2url.com/r2/default/images/1775161214671-8f5be9f8-d18f-4375-9da7-3e672acaed43.png" class="img-product" alt="Gaming Laptop">
            <em>High-performance laptop for gaming and productivity.</em>
            <button id="plus">+</button>
        </div>
        <div class="product">
            <h2>Product 2</h2>
            <img src="https://image2url.com/r2/default/images/1775162005757-15b2771f-4753-4419-aa34-0de5a47a0ba4.png" class="img-product" alt="Orange Shirt">
            <em> An orange shirt for a bright look.</em>
            <button id="plus">+</button>
        </div>
        <div class="product">
            <h2>Product 3</h2>
            <img src="https://image2url.com/r2/default/images/1775162313263-cd6e8a77-ad80-4558-b9cb-424ac8272e5c.png" class="img-product" alt="Gaming mouse">
            <em>A sleek gaming mouse for precise control.</em>
            <button id="plus">+</button>
        </div>
        <script src="app.js"></script>
</body>
</html>
